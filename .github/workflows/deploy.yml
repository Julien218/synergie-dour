name: 🚀 CI/CD — Synergie Dour

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    name: 🏗️ Build & Vérification
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: 🔧 Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10.4.1

      - name: 📚 Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: 🔍 TypeScript check
        run: pnpm run check
        continue-on-error: true

      - name: 🏗️ Build production
        run: pnpm run build
        env:
          NODE_ENV: production
          DATABASE_URL: "mysql://build:build@localhost:3306/build"

  notify:
    name: ✅ Build validé
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - name: ✅ Build OK — Railway déploie depuis GitHub
        run: |
          echo "✅ Build validé à $(date '+%Y-%m-%d %H:%M') UTC"
          echo "🚀 Railway détecte automatiquement le push sur main et déploie."
          echo "   Vérifiez l'avancement sur : https://railway.app/dashboard"
